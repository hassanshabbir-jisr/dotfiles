# Starship config
# Docs: https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$status\
$line_break\
$character"""

# Cloud/k8s metadata on the right — only shown when active
right_format = """$kubernetes$aws$gcloud"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[status]
disabled = false
symbol = "✖ "
format = '[$symbol$status](bold red) '

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "󰩌 "
untracked = "?"
stashed = " "
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
format = '([\[$all_status$ahead_behind\]]($style) )'

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[hostname]
ssh_only = true
format = "[$hostname](bold green) in "

[username]
show_always = false
format = "[$user]($style) in "

# ── Kubernetes ──────────────────────────────────────────────────────
[kubernetes]
disabled = false
symbol = "⎈ "
format = '[$symbol$context( \($namespace\))](bold cyan) '
# Show a short alias for long context names
[kubernetes.context_aliases]
"gke_.*_(?P<cluster>[\\w-]+)" = "gke:$cluster"
"arn:aws:eks:[\\w-]+:\\d+:cluster/(?P<cluster>[\\w-]+)" = "eks:$cluster"

# ── AWS ─────────────────────────────────────────────────────────────
[aws]
disabled = false
symbol = " "
format = '[$symbol($profile )(\($region\) )](bold yellow)'
# Only show when a profile or region is explicitly set
[aws.region_aliases]
"us-east-1"      = "us-e1"
"us-west-2"      = "us-w2"
"eu-west-1"      = "eu-w1"
"ap-southeast-1" = "ap-se1"

# ── Google Cloud ─────────────────────────────────────────────────────
[gcloud]
disabled = false
symbol = " "
format = '[$symbol$account(@$domain)(\($project\))](bold blue) '
